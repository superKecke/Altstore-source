name: Update AltStore Source

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # alle 30 Minuten

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest AnymeX release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: "RyanYuuki",
              repo: "AnymeX"
            });

            const ipa = release.data.assets.find(a => a.name.endsWith(".ipa"));

            if (!ipa) {
              core.setFailed("No IPA asset found.");
              return;
            }

            core.setOutput("version", release.data.tag_name);
            core.setOutput("url", ipa.browser_download_url);
            core.setOutput("date", release.data.published_at.substring(0,10));

      - name: Update source.json
        run: |
          node <<'EOF'
          const fs = require("fs");

          const version = process.env.VERSION;
          const url = process.env.URL;
          const date = process.env.DATE;

          const file = "source.json";
          const json = JSON.parse(fs.readFileSync(file, "utf8"));

          json.apps[0].version = version;
          json.apps[0].versionDate = date;
          json.apps[0].downloadURL = url;

          fs.writeFileSync(file, JSON.stringify(json, null, 2));
          EOF
        env:
          VERSION: ${{ steps.release.outputs.version }}
          URL: ${{ steps.release.outputs.url }}
          DATE: ${{ steps.release.outputs.date }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add source.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update AnymeX to ${{ steps.release.outputs.version }}"
          git push