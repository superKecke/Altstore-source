name: Update AnymeX Source

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest AnymeX release
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: "RyanYuuki",
              repo: "AnymeX"
            });

            const ipa = release.data.assets.find(asset =>
              asset.name.toLowerCase().endsWith(".ipa")
            );

            if (!ipa) {
              core.setFailed("No IPA asset found in latest release.");
              return;
            }

            core.setOutput("version", release.data.tag_name);
            core.setOutput("date", release.data.published_at);
            core.setOutput("notes", release.data.body || "");
            core.setOutput("download", ipa.browser_download_url);
            core.setOutput("size", ipa.size);

      - name: Update source.json
        env:
          VERSION: ${{ steps.latest.outputs.version }}
          DATE: ${{ steps.latest.outputs.date }}
          NOTES: ${{ steps.latest.outputs.notes }}
          DOWNLOAD: ${{ steps.latest.outputs.download }}
          SIZE: ${{ steps.latest.outputs.size }}
        run: |
          node <<'EOF'
          const fs = require("fs");

          const source = JSON.parse(fs.readFileSync("source.json", "utf8"));

          const app = source.apps[0];

          app.version = process.env.VERSION;
          app.versionDate = process.env.DATE;
          app.versionDescription = process.env.NOTES;
          app.downloadURL = process.env.DOWNLOAD;
          app.size = Number(process.env.SIZE);

          fs.writeFileSync(
            "source.json",
            JSON.stringify(source, null, 2) + "\n"
          );
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add source.json

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update AnymeX to ${{ steps.latest.outputs.version }}"
          git push